<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Я очень люблю Амину</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            color: #333;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        header {
            padding: 50px;
            animation: fadeIn 2s ease-in;
        }
        h1 {
            font-size: 3em;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            animation: bounce 2s infinite;
        }
        p {
            font-size: 1.5em;
            margin: 20px 0;
            animation: slideIn 1.5s ease-in-out;
        }
        .heart {
            font-size: 5em;
            color: red;
            margin: 20px 0;
            animation: pulse 1.5s infinite;
        }
        footer {
            margin-top: 50px;
            font-size: 1em;
            color: #666;
            animation: fadeInUp 2s ease-out;
        }
        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.2);
            }
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes slideIn {
            from {
                transform: translateX(-100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Я очень люблю Амину ❤️</h1>
    </header>
    <main>
        <p>Амина, ты самая замечательная!</p>
        <p>Ты приносишь радость и вдохновение в мою жизнь.</p>
        <div class="heart">❤️</div>
    </main>
    <footer>
        Сделано с любовью 💕
    </footer>
</body>
</html>
